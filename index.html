<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenV1 AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04040a;
    --surface: #0d0d1a;
    --border: #1a1a2e;
    --accent: #6d28d9;
    --accent2: #0ea5e9;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #475569;
    --user-bubble: #1e1b4b;
    --ai-bubble: #080812;
    --glow: rgba(109,40,217,0.15);
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 70% 50% at 15% 0%, rgba(109,40,217,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 85% 100%, rgba(14,165,233,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,158,11,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(4,4,10,0.85);
    backdrop-filter: blur(20px);
  }

  .logo-wrap {
    position: relative;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: white;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }

  .logo-glow {
    position: absolute;
    inset: -4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    opacity: 0.3;
    filter: blur(8px);
    z-index: 0;
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    background: linear-gradient(90deg, #fff 30%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }

  .header-info p {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .model-badge {
    background: rgba(14,165,233,0.1);
    border: 1px solid rgba(14,165,233,0.25);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.5px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #22c55e;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 8px #22c55e;
    animation: statusPulse 2s infinite;
  }

  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 8px #22c55e; }
    50% { box-shadow: 0 0 2px #22c55e; }
  }

  /* Chat container */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .messages-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Welcome screen */
  .welcome {
    text-align: center;
    padding: 40px 20px 20px;
    animation: fadeIn 0.6s ease;
  }

  .welcome-logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: white;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px rgba(109,40,217,0.4), 0 0 80px rgba(14,165,233,0.2);
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 30px;
    font-weight: 800;
    background: linear-gradient(90deg, #fff 30%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  .welcome p {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
    max-width: 360px;
    margin: 0 auto 32px;
  }

  .suggestions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    max-width: 500px;
    margin: 0 auto;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .suggestion-btn:hover {
    border-color: var(--accent);
    background: rgba(109,40,217,0.08);
    transform: translateY(-1px);
  }

  .suggestion-icon {
    font-size: 18px;
    display: block;
    margin-bottom: 6px;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    letter-spacing: -0.5px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 0 16px rgba(109,40,217,0.4);
  }

  .avatar.user {
    background: rgba(30,27,75,0.8);
    color: #a78bfa;
    border: 1px solid rgba(109,40,217,0.3);
  }

  .message-content {
    flex: 1;
    min-width: 0;
  }

  .message-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .message.user .message-label { text-align: right; }

  .bubble {
    display: inline-block;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.75;
    max-width: 100%;
    word-break: break-word;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: rgba(109,40,217,0.15);
    border: 1px solid rgba(109,40,217,0.3);
    border-top-right-radius: 4px;
    color: #c4b5fd;
    display: block;
    text-align: right;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 2px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    animation: typingBounce 1.3s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.18s; background: var(--accent); }
  .typing span:nth-child(3) { animation-delay: 0.36s; background: var(--accent3); }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* Input area */
  footer {
    position: relative;
    z-index: 10;
    padding: 14px 16px 20px;
    background: rgba(4,4,10,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-container {
    max-width: 760px;
    margin: 0 auto;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 12px 12px 18px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .input-wrap:focus-within {
    border-color: rgba(109,40,217,0.5);
    box-shadow: 0 0 0 3px rgba(109,40,217,0.08);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--muted); }

  #sendBtn {
    width: 40px;
    height: 40px;
    min-width: 40px;
    background: linear-gradient(135deg, var(--accent), #4c1d95);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(109,40,217,0.35);
  }

  #sendBtn:hover {
    box-shadow: 0 0 24px rgba(109,40,217,0.55);
    transform: scale(1.04);
  }

  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }

  #sendBtn svg { width: 17px; height: 17px; fill: white; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* Clear button */
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .clear-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  .input-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  .error-msg { color: #f87171; }
  .code-block {
    background: #0a0a14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo">R1</div>
  </div>
  <div class="header-info">
    <h1>RenV1 AI</h1>
    <p>Intelligent Assistant</p>
  </div>
  <div class="header-right">
    <span class="model-badge">GPT-4o</span>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>
</header>

<div id="chat">
  <div class="messages-inner" id="messagesInner">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">R1</div>
      <h2>Kumusta! Ako si RenV1 AI</h2>
      <p>Ang iyong personal na AI assistant. Magtanong ng kahit ano — sasagutin kita nang mabilis at maayos!</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)">
          <span class="suggestion-icon">💡</span>
          Explain quantum computing sa simple
        </button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">
          <span class="suggestion-icon">🧑‍💻</span>
          Gumawa ng Python script para sa web scraping
        </button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">
          <span class="suggestion-icon">✍️</span>
          Tulungan mo akong sumulat ng email
        </button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">
          <span class="suggestion-icon">🌏</span>
          I-translate ito sa English
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="input-container">
    <div class="input-actions">
      <button class="clear-btn" onclick="clearChat()">
        🗑 Clear Chat
      </button>
    </div>
    <div class="input-wrap">
      <textarea 
        id="msgInput" 
        placeholder="Magtanong ng kahit ano..." 
        rows="1" 
        onkeydown="handleKey(event)" 
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">RenV1 AI · Powered by Ren GPT-4o · Messages are not stored</p>
  </div>
</footer>

<script>
  // API calls go through Netlify function — API key is safe sa server side!
  
  let messages = [];
  let isLoading = false;

  const SYSTEM_PROMPT = `Ikaw si RenV1 AI — isang matalino, magalang, at masayahin na AI assistant. 
Sumasagot ka sa Filipino o English depende sa kung ano ang ginagamit ng user. 
Malinaw, tumpak, at helpful ang iyong mga sagot. 
Kung hindi mo alam ang sagot, sabihin mo nang tapat.
Para sa code, gamitin mo ang proper formatting.`;

  function useSuggestion(btn) {
    const text = btn.querySelector('span:last-child') ? btn.innerText.replace(/^[^\n]+\n/, '') : btn.innerText.split('\n').slice(1).join(' ');
    document.getElementById('msgInput').value = text.trim();
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addMessage(role, content) {
    removeWelcome();
    const container = document.getElementById('messagesInner');

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const label = role === 'ai' ? 'RenV1 AI' : 'Ikaw';
    
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? 'R1' : 'U'}</div>
      <div class="message-content">
        <div class="message-label">${label}</div>
        <div class="bubble">${formatContent(content)}</div>
      </div>
    `;

    container.appendChild(div);
    scrollToBottom();
    return div;
  }

  function formatContent(text) {
    // Basic formatting: code blocks, line breaks
    text = escapeHtml(text);
    // Code blocks
    text = text.replace(/```[\s\S]*?```/g, match => {
      const code = match.replace(/^```\w*\n?/, '').replace(/```$/, '');
      return `<div class="code-block">${code}</div>`;
    });
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code style="background:#1a1a2e;padding:2px 6px;border-radius:4px;font-size:12px;">$1</code>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function addTyping() {
    removeWelcome();
    const container = document.getElementById('messagesInner');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="avatar ai">R1</div>
      <div class="message-content">
        <div class="message-label">RenV1 AI</div>
        <div class="bubble" style="padding: 16px 18px;">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      </div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function clearChat() {
    messages = [];
    const container = document.getElementById('messagesInner');
    container.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-logo">R1</div>
        <h2>Chat Cleared!</h2>
        <p>Handa akong tumulong ulit. Magtanong ka ng kahit ano!</p>
      </div>
    `;
  }

  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    addTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...messages
          ],
          max_tokens: 2048,
          temperature: 0.7,
          stream: false
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      removeTyping();

      const reply = data.choices?.[0]?.message?.content || 'Walang natanggap na sagot.';
      messages.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      addMessage('ai', `<span class="error-msg">❌ Error: ${escapeHtml(err.message)}</span>`);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
  </html>
